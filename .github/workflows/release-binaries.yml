name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.15.0)'
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os: ubuntu-24.04
            archive: tar.gz
            binary: openclaude
            smoke: true
          - target: bun-linux-arm64
            os: ubuntu-24.04-arm
            archive: tar.gz
            binary: openclaude
            smoke: true
          - target: bun-darwin-x64
            os: macos-14
            archive: tar.gz
            binary: openclaude
            smoke: false
          - target: bun-darwin-arm64
            os: macos-14
            archive: tar.gz
            binary: openclaude
            smoke: true
          - target: bun-windows-x64
            os: windows-latest
            archive: zip
            binary: openclaude.exe
            smoke: true
          - target: bun-windows-arm64
            os: windows-11-arm
            archive: zip
            binary: openclaude.exe
            smoke: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            VERSION="${{ inputs.tag }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build bundle
        run: bun run build

      - name: Compile binary
        shell: bash
        run: |
          mkdir -p artifacts
          bun build ./dist/cli.mjs \
            --compile --minify --bytecode \
            --target=${{ matrix.target }} \
            --outfile=artifacts/${{ matrix.binary }}

      - name: Smoke test
        if: matrix.smoke
        shell: bash
        run: |
          chmod +x artifacts/${{ matrix.binary }} || true
          artifacts/${{ matrix.binary }} --version

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd artifacts
          tar czf "../openclaude-${{ steps.ver.outputs.version }}-${{ matrix.target }}.tar.gz" "${{ matrix.binary }}"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "artifacts/${{ matrix.binary }}" `
            -DestinationPath "openclaude-${{ steps.ver.outputs.version }}-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: openclaude-${{ matrix.target }}
          path: openclaude-${{ steps.ver.outputs.version }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: always() && !cancelled() && needs.build.result == 'success'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum openclaude-* > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/openclaude-*
            artifacts/SHA256SUMS.txt
